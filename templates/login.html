<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AdaptEd Namsan Course</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <div class="card shadow border-0 rounded-4 overflow-hidden">
                        <div class="card-header-custom">
                            <div class="brand-title mb-1">
                                <span class="edu">Adapt</span><span class="sphere text-white">Ed</span>
                            </div>
                            <p class="mb-0 text-dark opacity-75 small fw-bold">NAMSAN KOREAN COURSE</p>
                        </div>
                        
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <h4 class="fw-bold">Annyeonghaseyo! 👋</h4>
                                <p class="text-muted small">Silakan masuk untuk melanjutkan belajar.</p>
                            </div>

                            <form method="POST" action="{{ url_for('login') }}">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Username</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                                        <input type="text" class="form-control bg-light border-0 rounded-end" name="username" placeholder="Masukkan username" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-bold">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                        <input type="password" class="form-control bg-light border-0 rounded-end" name="password" placeholder="Masukkan password" required>
                                    </div>
                                </div>
                                
                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary py-2 rounded-pill fw-bold">Masuk Sekarang</button>
                                </div>
                            </form>

                            <div class="text-center mt-4">
                                <a href="{{ url_for('index') }}" class="btn btn-sm btn-light rounded-pill px-4 text-muted">
                                    <i class="fas fa-arrow-left me-2"></i>Beranda
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
