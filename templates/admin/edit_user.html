{% extends 'base.html' %}
{% block title %}Edit Pengguna{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex align-items-center mb-4">
        <a href="{{ url_for('manage_users') }}" class="btn btn-outline-secondary rounded-circle me-3 shadow-sm border-2">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">Edit Pengguna</h2>
            <p class="text-muted mb-0">Perbarui data profil atau reset password pengguna.</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    
                    <form method="POST" action="{{ url_for('edit_user', user_id=user.id) }}">
                        
                        <div class="mb-4 text-center">
                            <div class="avatar-initials mx-auto mb-2" style="width: 70px; height: 70px; font-size: 24px;">
                                {{ user.nama_lengkap[:2].upper() }}
                            </div>
                            <span class="badge bg-light text-dark border shadow-sm px-3 py-2">ID Pengguna: {{ user.id }}</span>
                        </div>

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Nama Lengkap</label>
                                <input type="text" name="nama_lengkap" class="form-control rounded-3 py-2" value="{{ user.nama_lengkap }}" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Username</label>
                                <input type="text" name="username" class="form-control rounded-3 py-2" value="{{ user.username }}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Role (Peran)</label>
                                <select name="role" class="form-select rounded-3 py-2" required>
                                    <option value="siswa" {% if user.role == 'siswa' %}selected{% endif %}>Siswa</option>
                                    <option value="pengajar" {% if user.role == 'pengajar' %}selected{% endif %}>Pengajar</option>
                                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Administrator</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Reset Password Baru</label>
                                <input type="password" name="password" class="form-control rounded-3 py-2" placeholder="Ketik untuk mengubah...">
                                <div class="form-text small text-danger"><i class="fas fa-info-circle me-1"></i>Biarkan kosong jika tidak ingin mengubah password.</div>
                            </div>
                        </div>

                        <hr class="my-5 opacity-25">

                        <div class="d-flex justify-content-end gap-3">
                            <a href="{{ url_for('manage_users') }}" class="btn btn-light rounded-pill px-4 fw-bold">Batal</a>
                            <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm">
                                <i class="fas fa-save me-2"></i>Simpan Perubahan
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Efek loading saat tombol simpan ditekan
    document.querySelector('form').addEventListener('submit', function() {
        const btn = this.querySelector('button[type="submit"]');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Menyimpan...';
        btn.classList.add('disabled');
    });
</script>
{% endblock %}
