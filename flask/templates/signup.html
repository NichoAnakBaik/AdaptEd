<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - EduSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #e9ecef; }
        .signup-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .card-header-custom { background: linear-gradient(45deg, #28a745, #218838); text-align: center; padding: 2rem; color: white; }
        .brand-title .edu { color: #ffffff; font-size: 50px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .brand-title .sphere { color: #d1e7dd; font-size: 45px; font-weight: 300; }
        .card-body { padding: 2.5rem; }
    </style>
</head>
<body>
    <div class="signup-wrapper">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card">
                <div class="card-header-custom">
                    <div class="brand-title"><span class="edu">Edu</span><span class="sphere">Sphere</span></div>
                    <p class="mb-0 mt-2">Buat akun baru Anda</p>
                </div>
                <div class="card-body">
                    <h2 class="text-center mb-4">Daftar</h2>
                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert"><i class="fas fa-exclamation-triangle me-2"></i><div>{{ error }}</div></div>
                    {% endif %}
                    {% if success %}
                    <div class="alert alert-success d-flex align-items-center" role="alert"><i class="fas fa-check-circle me-2"></i><div>{{ success }} <a href="{{ url_for('login') }}" class="alert-link">Silakan login</a>.</div></div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('signup') }}">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password (min. 6 karakter)</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Konfirmasi Password" required>
                            <label for="confirm_password">Konfirmasi Password</label>
                        </div>
                        <div class="form-floating mb-4">
                            <select class="form-select" id="role" name="role" required>
                                <option value="" selected disabled>Pilih Role Anda</option>
                                <option value="mahasiswa">Mahasiswa</option>
                                <option value="dosen">Dosen</option>
                            </select>
                            <label for="role">Saya adalah seorang</label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg fw-bold">Daftar</button>
                        </div>
                    </form>
                    <div class="text-center mt-4"><p>Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a></p></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
