{% extends 'base.html' %}

{% block title %}Edit Materi{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-11">
             <a href="{{ url_for('materi') }}" class="btn btn-outline-secondary mb-3"><i class="fas fa-arrow-left me-2"></i>Kembali ke Daftar Materi</a>
            <div class="card shadow-sm">
                <div class="card-header py-3">
                    <h4 class="mb-0"><i class="fas fa-edit text-primary me-2"></i>Edit Materi</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('edit_materi', materi_id=materi.id) }}" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="title" class="form-label fw-bold">Judul Materi *</label>
                                <input type="text" class="form-control" id="title" name="title" value="{{ materi.title }}" required>
                            </div>
                            <div class="col-12">
                                <label for="content" class="form-label fw-bold">Deskripsi Singkat</label>
                                <textarea class="form-control" id="content" name="content" rows="4">{{ materi.content }}</textarea>
                            </div>
                            {% if materi.file_name %}
                            <div class="col-12">
                                <label class="form-label fw-bold">File Saat Ini</label>
                                <div class="alert alert-secondary py-2">
                                    <i class="fas fa-paperclip me-2"></i>
                                    <a href="{{ url_for('static', filename='uploads/' + materi.file_name) }}" target="_blank">{{ materi.file_name }}</a>
                                </div>
                            </div>
                            {% endif %}
                            <div class="col-12">
                                <label for="file" class="form-label fw-bold">Ganti File (Opsional)</label>
                                <input class="form-control" type="file" id="file" name="file">
                                <div class="form-text">Jika Anda mengunggah file baru, file lama akan otomatis diganti.</div>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('materi') }}" class="btn btn-secondary">Batal</a>
                            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i>Simpan Perubahan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
