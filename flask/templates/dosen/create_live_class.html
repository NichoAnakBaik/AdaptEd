{% extends 'base.html' %}

{% block title %}Jadwalkan Live Class{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-11">
            <a href="{{ url_for('live_class') }}" class="btn btn-outline-secondary mb-3"><i class="fas fa-arrow-left me-2"></i>Kembali ke Jadwal</a>
            <div class="card shadow-sm">
                <div class="card-header py-3">
                    <h4 class="mb-0"><i class="fas fa-calendar-plus text-primary me-2"></i>Jadwalkan Live Class Baru</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('create_live_class') }}" novalidate>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-bold">Judul Sesi *</label>
                                <input type="text" name="title" class="form-control" placeholder="Contoh: Pembahasan Bab 3 - Normalisasi Database" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Untuk Kelas *</label>
                                <select name="id_kelas" class="form-select" required>
                                    <option value="" disabled selected>-- Pilih Kelas --</option>
                                    {% for kelas in kelas_list %}<option value="{{ kelas.id_kelas }}">{{ kelas.nama_kelas }}</option>{% endfor %}
                                </select>
                            </div>
                             <div class="col-md-6">
                                <label class="form-label fw-bold">Link Meeting (URL) *</label>
                                <input type="url" name="link" class="form-control" placeholder="https://..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tanggal & Waktu Mulai *</label>
                                <input type="datetime-local" name="date_time" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Durasi (menit) *</label>
                                <input type="number" name="duration" class="form-control" value="60" min="15" max="240" step="5" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Deskripsi (Opsional)</label>
                                <textarea name="description" class="form-control" rows="3" placeholder="Topik utama, persiapan yang dibutuhkan mahasiswa, dll."></textarea>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('live_class') }}" class="btn btn-secondary">Batal</a>
                            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i>Jadwalkan Sesi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
