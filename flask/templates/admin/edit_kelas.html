{% extends 'base.html' %}
{% block title %}Edit Kelas{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex align-items-center mb-4">
        <a href="{{ url_for('admin_kelas') }}" class="btn btn-outline-secondary rounded-circle me-3 shadow-sm border-2">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">Edit Kelas: {{ kelas.nama_kelas }}</h2>
            <p class="text-muted mb-0">Perbarui informasi pengajar, level, atau tautan kelas.</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <form method="POST" action="{{ url_for('edit_kelas', id_kelas=kelas.id_kelas) }}">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Nama Kelas</label>
                            <input type="text" name="nama_kelas" class="form-control form-control-lg rounded-3" value="{{ kelas.nama_kelas }}" required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Level Bahasa</label>
                                <select name="level_bahasa" class="form-select rounded-3">
                                    {% for i in range(1, 6) %}
                                        <option value="Level {{ i }}" {% if kelas.level_bahasa == 'Level ' ~ i %}selected{% endif %}>Level {{ i }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Pengajar</label>
                                <select name="id_pengajar" class="form-select rounded-3">
                                    <option value="">-- Tanpa Pengajar --</option>
                                    {% for p in pengajar_list %}
                                        <option value="{{ p.id }}" {% if kelas.id_pengajar == p.id %}selected{% endif %}>{{ p.nama_lengkap }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Tipe Kelas</label>
                                <select name="tipe_kelas" id="tipe_edit" class="form-select rounded-3">
                                    <option value="offline" {% if kelas.tipe_kelas == 'offline' %}selected{% endif %}>Offline</option>
                                    <option value="online" {% if kelas.tipe_kelas == 'online' %}selected{% endif %}>Online</option>
                                </select>
                            </div>
                            <div class="col-md-6" id="link_edit_group" {% if kelas.tipe_kelas == 'offline' %}style="display:none;"{% endif %}>
                                <label class="form-label fw-bold small">Link Tautan Kelas</label>
                                <input type="url" name="link_kelas" class="form-control rounded-3" value="{{ kelas.link_kelas or '' }}" placeholder="https://...">
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Simpan Perubahan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('tipe_edit').addEventListener('change', function() {
        document.getElementById('link_edit_group').style.display = (this.value === 'online') ? 'block' : 'none';
    });
</script>
{% endblock %}
