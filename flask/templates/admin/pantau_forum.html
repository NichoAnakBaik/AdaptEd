{% extends 'base.html' %}
{% block title %}Pantau Forum Diskusi{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="mb-4">
        <h2 class="fw-bold"><i class="fas fa-comments text-primary me-2"></i>Pantau Forum Diskusi</h2>
        <p class="text-muted">Lihat dan awasi percakapan yang terjadi di setiap kelas.</p>
    </div>

    <div class="row g-4">
        {% for f in forum_summary %}
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 d-flex align-items-center">
                    <div class="bg-info bg-opacity-10 text-info p-3 rounded-circle me-3">
                        <i class="fas fa-users-class fa-lg"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h6 class="fw-bold mb-0">{{ f.nama_kelas }}</h6>
                        <small class="text-muted">{{ f.total_pesan }} pesan obrolan</small>
                    </div>
                    <a href="{{ url_for('admin_forum_detail', id_kelas=f.id_kelas) }}" class="btn btn-light rounded-circle shadow-sm border">
                        <i class="fas fa-chevron-right text-primary"></i>
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
