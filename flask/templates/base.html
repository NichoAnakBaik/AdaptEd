<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSphere - {% block title %}Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #3498db; --primary-dark: #2980b9; --secondary: #2ecc71; --dark: #34495e;
      --light: #ecf0f1; --danger: #e74c3c; --warning: #f39c12; --gray: #95a5a6; --sidebar-width: 250px;
    }
    body { background-color: #f5f7fa; display: flex; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .sidebar {
      width: var(--sidebar-width); background: var(--dark); color: white; height: 100vh;
      position: fixed; top: 0; left: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: space-between;
      box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
    }
    .sidebar-header { padding: 1.5rem; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .sidebar-logo { font-size: 1.8rem; font-weight: bold; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
    .sidebar-logo i { margin-right: 0.75rem; color: var(--secondary); }
    .sidebar-nav { padding: 1rem 0; flex-grow: 1; list-style: none; margin: 0; }
    .nav-link {
      color: rgba(255, 255, 255, 0.8); text-decoration: none; padding: 0.9rem 1.5rem; display: flex;
      align-items: center; transition: all 0.3s ease; border-left: 4px solid transparent;
    }
    .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: white; border-left-color: var(--primary); }
    .nav-link.active { background: var(--primary); color: white; border-left-color: var(--secondary); font-weight: 600; }
    .nav-link i { margin-right: 1rem; font-size: 1.1rem; width: 20px; text-align: center;}
    .sidebar-footer { padding: 1rem; text-align: center; font-size: 0.8rem; color: var(--gray); }
    .logout-btn {
      background: rgba(231, 76, 60, 0.2); border: 1px solid var(--danger); color: white; cursor: pointer;
      font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; width: 100%;
      justify-content: center; text-align: left; transition: all 0.3s; border-radius: 8px; font-weight: 500;
    }
    .logout-btn:hover { background: var(--danger); }
    .main-content { flex: 1; margin-left: var(--sidebar-width); }
    .content { padding: 2rem; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div>
      <div class="sidebar-header">
        <a href="{{ url_for('dashboard') }}" class="sidebar-logo">
          <i class="fas fa-graduation-cap"></i><span>EduSphere</span>
        </a>
      </div>
      <ul class="sidebar-nav p-0">
        <li><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
        <li><a class="nav-link" href="{{ url_for('materi') }}"><i class="fas fa-book"></i><span>Materi</span></a></li>
        <li><a class="nav-link" href="{{ url_for('kuis') }}"><i class="fas fa-pencil-alt"></i><span>Kuis</span></a></li>
        <li><a class="nav-link" href="{{ url_for('forum') }}"><i class="fas fa-comments"></i><span>Forum</span></a></li>
        <li><a class="nav-link" href="{{ url_for('live_class') }}"><i class="fas fa-video"></i><span>Live Class</span></a></li>
      </ul>
    </div>
    <div class="sidebar-footer">
        <form method="POST" action="{{ url_for('logout') }}" class="mb-3">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
        </form>          
      <small>© 2025 EduSphere</small>
    </div>
  </aside>

  <main class="main-content">
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const navLinks = document.querySelectorAll(".sidebar-nav .nav-link");
      const currentPath = window.location.pathname;
      navLinks.forEach(link => {
        const linkPath = link.getAttribute("href");
        if (linkPath === "/dashboard" && currentPath === linkPath) {
          link.classList.add("active");
        } else if (linkPath !== "/dashboard" && currentPath.startsWith(linkPath)) {
          link.classList.add("active");
        }
      });
    });
  </script>
</body>
</html>
