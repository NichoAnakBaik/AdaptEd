<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Namsan Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #fffcf8; }
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.1); overflow: hidden; }
        
        /* Tema Baru Oranye ke Kuning */
        .card-header-custom { background: linear-gradient(45deg, #f97316, #eab308); text-align: center; padding: 2rem; color: white; }
        
        .brand-title { font-size: 45px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .brand-title .edu { color: #ffffff; }
        .brand-title .sphere { color: #fff7ed; }
        
        /* Paksa tombol login menjadi oranye */
        .btn-primary { background-color: #f97316; border-color: #f97316; }
        .btn-primary:hover { background-color: #ea580c; border-color: #ea580c; }
        a { color: #f97316; }
        a:hover { color: #ea580c; }
    </style>
</head>
<body>
    <div class="container login-wrapper">
        <div class="col-md-6 col-lg-4">
            <div class="card">
                <div class="card-header-custom">
                    <div class="brand-title"><span class="edu">Adapt</span><span class="sphere">Ed</span></div>
                    <p class="mb-0 mt-2 text-light">Sistem Analitik Namsan Course</p>
                </div>
                <div class="card-body p-4">
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Login</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p>Belum punya akun? <a href="{{ url_for('signup') }}">Daftar di sini</a></p>
                        <a href="{{ url_for('index') }}" class="btn btn-link btn-sm mt-1">
                            <i class="fas fa-arrow-left me-1"></i> Kembali ke Beranda
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
