<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #e9ecef; /* Warna latar yang sedikit lebih lembut */
        }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 15px; /* Radius lebih besar untuk tampilan modern */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Penting untuk menjaga border-radius */
        }
        .card-header-custom {
            background: linear-gradient(45deg, #007bff, #0056b3);
            text-align: center;
            padding: 2rem;
            color: white;
        }
        .brand-title .edu {
            color: #ffffff;
            font-size: 50px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .brand-title .sphere {
            color: #cce5ff; /* Warna yang lebih terang untuk kontras */
            font-size: 45px;
            font-weight: 300;
        }
        .card-body {
            padding: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card">
                <div class="card-header-custom">
                    <div class="brand-title">
                        <span class="edu">Edu</span><span class="sphere">Sphere</span>
                    </div>
                    <p class="mb-0 mt-2">Silakan masuk untuk melanjutkan</p>
                </div>
                <div class="card-body">
                    <h2 class="text-center mb-4">Login</h2>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <div>{{ error }}</div>
                    </div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Login</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p>Belum punya akun? <a href="{{ url_for('signup') }}">Daftar di sini</a></p>
                        <a href="{{ url_for('index') }}" class="btn btn-link btn-sm mt-1">
                            <i class="fas fa-arrow-left me-1"></i> Kembali ke Beranda
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
